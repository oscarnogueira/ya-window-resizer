<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Position">
      <sdpi-select setting="position" default="maximize">
        <option value="left-half">Left half</option>
        <option value="right-half">Right half</option>
        <option value="top-half">Top half</option>
        <option value="bottom-half">Bottom half</option>
        <option value="left-third">Left third</option>
        <option value="center-third">Center third</option>
        <option value="right-third">Right third</option>
        <option value="left-two-thirds">Left two-thirds</option>
        <option value="right-two-thirds">Right two-thirds</option>
        <option value="top-left">Top-left</option>
        <option value="top-right">Top-right</option>
        <option value="bottom-left">Bottom-left</option>
        <option value="bottom-right">Bottom-right</option>
        <option value="maximize">Maximize</option>
        <option value="center">Center</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Accent color">
      <sdpi-color global setting="accentColor" default="#3B99FC"></sdpi-color>
    </sdpi-item>

    <!-- Global gaps: the slider and the number field bind to the same setting,
         so editing either one updates the other. -->
    <sdpi-item label="Screen gap (px)">
      <sdpi-range global setting="screenGap" min="0" max="100" default="0" step="1"></sdpi-range>
      <sdpi-textfield global setting="screenGap" type="number" min="0" max="100"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Window gap (px)">
      <sdpi-range global setting="windowGap" min="0" max="100" default="0" step="1"></sdpi-range>
      <sdpi-textfield global setting="windowGap" type="number" min="0" max="100"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Override offset">
      <sdpi-checkbox setting="useCustomOffset"></sdpi-checkbox>
    </sdpi-item>
    <sdpi-item label="This button screen gap">
      <sdpi-range setting="screenGap" min="0" max="100" default="0" step="1"></sdpi-range>
      <sdpi-textfield setting="screenGap" type="number" min="0" max="100"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="This button window gap">
      <sdpi-range setting="windowGap" min="0" max="100" default="0" step="1"></sdpi-range>
      <sdpi-textfield setting="windowGap" type="number" min="0" max="100"></sdpi-textfield>
    </sdpi-item>
  </body>
</html>
